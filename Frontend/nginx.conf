server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # API-Requests zum Backend weiterleiten
    location /api/ {
        proxy_pass http://segginote-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}